<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市售健康飲品成分分析 | 180–280ml</title>
<meta name="description" content="市售 180–280ml 健康營養飲品成分比較分析，含熱量、糖分、鈉、蛋白質等營養素視覺化圖表。">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --green: #2e7d5e;
  --green-light: #52b788;
  --green-pale: #d8f3e8;
  --bg: #f4faf7;
  --card: #ffffff;
  --text: #1a2e25;
  --muted: #5a7a6a;
  --border: #d0e8dc;
  --orange: #e07b39;
  --blue: #3a7bd5;
  --red: #d94f4f;
  --yellow: #e8b84b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: var(--bg); color: var(--text); }

/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, #1b4d35 0%, #2e7d5e 60%, #52b788 100%);
  color: #fff;
  padding: 3rem 1.5rem 2.5rem;
  text-align: center;
}
.hero h1 { font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 700; letter-spacing: .02em; }
.hero p { margin-top: .6rem; opacity: .85; font-size: .95rem; }
.hero .badges { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; margin-top: 1.2rem; }
.badge { background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: .3rem .9rem; font-size: .8rem; }

/* ── CONTROLS ── */
.controls {
  max-width: 1100px; margin: 1.5rem auto .5rem; padding: 0 1rem;
  display: flex; flex-wrap: wrap; gap: .75rem; align-items: center;
}
.controls input, .controls select {
  padding: .55rem .9rem; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .9rem; font-family: inherit; background: #fff; outline: none;
}
.controls input { flex: 1; min-width: 180px; }
.controls input:focus, .controls select:focus { border-color: var(--green-light); }
#count { color: var(--muted); font-size: .85rem; margin-left: auto; }

/* ── SUMMARY STATS ── */
.stats-row {
  max-width: 1100px; margin: 1rem auto; padding: 0 1rem;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .75rem;
}
.stat-card {
  background: var(--card); border-radius: 12px; padding: 1rem 1.2rem;
  box-shadow: 0 1px 4px rgba(0,0,0,.06); text-align: center;
}
.stat-card .val { font-size: 1.6rem; font-weight: 700; color: var(--green); }
.stat-card .lbl { font-size: .78rem; color: var(--muted); margin-top: .2rem; }

/* ── CHARTS ── */
.charts-section {
  max-width: 1100px; margin: 1rem auto; padding: 0 1rem;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;
}
.chart-card {
  background: var(--card); border-radius: 12px; padding: 1.2rem 1.4rem;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.chart-card h3 { font-size: .85rem; color: var(--muted); margin-bottom: 1rem; font-weight: 500; }
.chart-card canvas { max-height: 220px; }

/* ── RANKING TABLE ── */
.ranking-section {
  max-width: 1100px; margin: 1rem auto; padding: 0 1rem;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;
}
.rank-card {
  background: var(--card); border-radius: 12px; padding: 1.2rem 1.4rem;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.rank-card h3 { font-size: .85rem; color: var(--muted); margin-bottom: .8rem; font-weight: 500; }
.rank-item {
  display: flex; align-items: center; gap: .6rem;
  padding: .45rem 0; border-bottom: 1px solid var(--border); font-size: .85rem;
}
.rank-item:last-child { border-bottom: none; }
.rank-no { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; flex-shrink: 0; }
.rank-no.gold   { background: #ffd700; color: #7a5c00; }
.rank-no.silver { background: #c0c0c0; color: #444; }
.rank-no.bronze { background: #cd7f32; color: #fff; }
.rank-no.other  { background: var(--green-pale); color: var(--green); }
.rank-name { flex: 1; line-height: 1.3; }
.rank-val { font-weight: 600; color: var(--text); }

/* ── PRODUCT GRID ── */
#grid {
  max-width: 1100px; margin: 1rem auto 3rem; padding: 0 1rem;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1rem;
}
.card {
  background: var(--card); border-radius: 14px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,.07); cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,.12); }
.card-img {
  width: 100%; height: 160px; object-fit: contain;
  background: linear-gradient(135deg, #f0faf5, #e8f5ee); padding: .75rem;
}
.card-body { padding: 1rem 1.1rem 1.1rem; }
.card-body h2 { font-size: .95rem; font-weight: 600; line-height: 1.35; }
.card-brand { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
.card-tags { display: flex; gap: .35rem; flex-wrap: wrap; margin-top: .55rem; }
.tag { font-size: .7rem; padding: .15rem .5rem; border-radius: 20px; background: var(--green-pale); color: var(--green); }
.tag.orange { background: #fdebd8; color: var(--orange); }
.tag.blue   { background: #dce8f8; color: var(--blue); }

/* ── NUTRIBAR ── */
.nutribar { margin-top: .85rem; }
.nb-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .35rem; font-size: .78rem; }
.nb-lbl { width: 82px; color: var(--muted); flex-shrink: 0; }
.nb-track { flex: 1; height: 7px; background: #e8f0ec; border-radius: 4px; overflow: hidden; }
.nb-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.nb-val { width: 44px; text-align: right; font-weight: 500; }

/* ── MODAL ── */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 200;
  align-items: center; justify-content: center; padding: 1rem;
}
#overlay.open { display: flex; }
#modal {
  background: #fff; border-radius: 18px;
  max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto;
  padding: 1.6rem; position: relative;
}
#modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: var(--bg); border: none; border-radius: 50%;
  width: 32px; height: 32px; font-size: 1rem; cursor: pointer; color: var(--muted);
}
#modal img { width: 100%; max-height: 200px; object-fit: contain; background: #f0faf5; border-radius: 10px; margin-bottom: 1rem; }
#modal h2 { font-size: 1.15rem; font-weight: 700; }
#modal .m-brand { color: var(--muted); font-size: .85rem; margin: .25rem 0 .75rem; }
.m-section { font-size: .75rem; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .06em; margin: 1rem 0 .4rem; }
#modal table { width: 100%; border-collapse: collapse; font-size: .88rem; }
#modal td { padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
#modal td:last-child { text-align: right; font-weight: 600; }
.m-ingredients { font-size: .82rem; line-height: 1.7; color: #444; }
.score-ring { display: flex; align-items: center; gap: 1rem; margin: .5rem 0 1rem; }
.ring { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; flex-shrink: 0; }
.score-desc { font-size: .82rem; color: var(--muted); line-height: 1.5; }

#no-result { text-align: center; color: var(--muted); padding: 3rem; display: none; }

/* ── COMPARISON TABLE ── */
.compare-section {
  max-width: 1200px; margin: 1rem auto 0; padding: 0 1rem;
}
.compare-section h2 {
  font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: .75rem;
}
.compare-outer {
  display: flex;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
  overflow: hidden;
  max-height: 540px;
}
/* 左欄固定 */
.compare-left {
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  z-index: 2;
  box-shadow: 2px 0 6px rgba(0,0,0,.08);
}
.compare-left::-webkit-scrollbar { display: none; }
/* 右欄橫向捲動 */
.compare-right {
  flex: 1;
  overflow-x: auto;
  overflow-y: auto;
}
/* 左右捲動同步 */
.compare-table-left, .compare-table-right {
  border-collapse: collapse;
  font-size: .82rem;
  white-space: nowrap;
}
.compare-table-left th, .compare-table-right th {
  background: var(--green);
  color: #fff;
  padding: .6rem .85rem;
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 1;
  border-bottom: 2px solid #1b4d35;
}
.compare-table-left th { background: #1b4d35; text-align: left; min-width: 160px; }
.compare-table-right th { text-align: center; min-width: 110px; }
.compare-table-left td {
  background: #f4faf7;
  padding: .5rem .85rem;
  font-weight: 600;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  border-right: 3px solid var(--border);
  text-align: left;
}
.compare-table-right td {
  padding: .5rem .75rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.compare-table-left tr:hover td { background: #e0f0e8; }
.compare-table-right tr:hover td { background: #edf7f2; }
/* 熱度色 */
.cell-best { background: #c8f0da !important; color: #1a5c35; font-weight: 700; }
.cell-good { background: #e8f7ee !important; }
.cell-warn { background: #fff3cd !important; color: #7a5c00; }
.cell-bad  { background: #fde8e8 !important; color: #8b1a1a; font-weight: 700; }
.cell-na   { color: #bbb; }
.col-name  { font-size: .78rem; line-height: 1.3; }
.col-brand { font-size: .7rem; opacity: .75; }

.cell-best  { background: #c8f0da !important; color: #1a5c35; font-weight: 700; }
.cell-good  { background: #e8f7ee !important; }

.cell-bad   { background: #fde8e8 !important; color: #8b1a1a; font-weight: 700; }
.cell-na    { color: #bbb; }
/* 產品欄標題 */
.col-name   { font-size: .78rem; line-height: 1.3; max-width: 100px; white-space: normal; }
.col-brand  { font-size: .7rem; opacity: .75; }

@media (max-width: 600px) {
  .charts-section, .ranking-section { grid-template-columns: 1fr; }
}
</style>

    <option value="energy_asc">熱量 低→高</option>

    <option value="sugar_asc">糖分 低→高</option>
    <option value="sugar_desc">糖分 高→低</option>

  <span id="count"></span>
</div>

<!-- 統計摘要 -->
<div class="stats-row" id="stats-row"></div>

<!-- 圖表 -->
<div class="charts-section">
  <div class="chart-card">
    <h3>📊 熱量比較（kcal / 100ml）</h3>
    <canvas id="chartEnergy"></canvas>
  </div>
  <div class="chart-card">
    <h3>🍬 糖分比較（g / 100ml）</h3>
    <canvas id="chartSugar"></canvas>
  </div>

    <canvas id="chartScatter"></canvas>
  </div>
  <div class="chart-card">
    <h3>🧂 鈉含量比較（mg / 100ml）</h3>
    <canvas id="chartSodium"></canvas>
  </div>
</div>

<!-- 排行榜 -->
<div class="ranking-section">
  <div class="rank-card">
    <h3>🏆 最低熱量 TOP 5</h3>
    <div id="rank-energy-low"></div>
  </div>
  <div class="rank-card">
    <h3>🍬 最低糖分 TOP 5</h3>
    <div id="rank-sugar-low"></div>
  </div>
  <div class="rank-card">
    <h3>💪 最高蛋白質 TOP 5</h3>
    <div id="rank-protein-high"></div>
  </div>
  <div class="rank-card">
    <h3>⚠️ 高糖警示（>10g/100ml）</h3>
    <div id="rank-sugar-high"></div>
  </div>
</div>

<!-- 比較矩陣表格 -->
<div class="compare-section">
  <h2>📋 成分比較矩陣</h2>
  <div class="compare-outer" id="compare-outer">
    <div class="compare-left">
      <table class="compare-table-left">
        <thead id="compare-head-left"></thead>
        <tbody id="compare-body-left"></tbody>
      </table>
    </div>
    <div class="compare-right" id="compare-right">
      <table class="compare-table-right">
        <thead id="compare-head-right"></thead>
        <tbody id="compare-body-right"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 產品卡片 -->
<div id="grid"></div>
<div id="no-result">找不到符合的飲品</div>

<!-- Modal -->
<div id="overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

// ── 工具函式 ──
const N = (d, k) => d.nutrients?.[k] ?? null;
const PLACEHOLDER = `data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160"><rect fill="#f0faf5" width="200" height="160"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#5a7a6a" font-size="13" font-family="sans-serif">無圖片</text></svg>')}`;

// 健康評分（0-100，越高越健康）
function healthScore(d) {
  let score = 100;
  const sugar = N(d, "糖(g)") ?? 5;
  const energy = N(d, "熱量(kcal)") ?? 30;
  const sodium = N(d, "鈉(mg)") ?? 20;
  const protein = N(d, "蛋白質(g)") ?? 0;
  score -= Math.min(40, sugar * 3);       // 糖扣分
  score -= Math.min(20, energy * 0.25);   // 熱量扣分
  score -= Math.min(15, sodium * 0.08);   // 鈉扣分
  score += Math.min(15, protein * 3);     // 蛋白質加分
  return Math.max(0, Math.min(100, Math.round(score)));
}

function scoreColor(s) {
  if (s >= 75) return "#2e7d5e";
  if (s >= 50) return "#e8b84b";
  return "#d94f4f";
}

function scoreLabel(s) {
  if (s >= 75) return "優良";
  if (s >= 50) return "普通";
  return "注意";
}

// 條形顏色
const BAR_COLORS = {
  "熱量(kcal)": "#e07b39",
  "糖(g)":      "#d94f4f",
  "鈉(mg)":     "#3a7bd5",
  "蛋白質(g)":  "#2e7d5e",
};
const BAR_MAX = { "熱量(kcal)": 80, "糖(g)": 15, "鈉(mg)": 150, "蛋白質(g)": 6 };
const BAR_KEYS = Object.keys(BAR_MAX);

// ── 初始化 ──
let filtered = [...DRINKS];

function allCategories() {
  const s = new Set();
  DRINKS.forEach(d => d.categories.forEach(c => s.add(c)));
  return [...s].sort();
}

function initCategoryFilter() {
  const sel = document.getElementById("filter-cat");
  allCategories().forEach(c => {
    const o = document.createElement("option");
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

// ── 統計摘要 ──
function renderStats(list) {
  const vals = k => list.map(d => N(d, k)).filter(v => v !== null);
  const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : "—";
  const min = arr => arr.length ? Math.min(...arr) : "—";

  const stats = [
    { val: list.length, lbl: "飲品總數" },
    { val: avg(vals("熱量(kcal)")), lbl: "平均熱量 kcal/100ml" },
    { val: avg(vals("糖(g)")), lbl: "平均糖分 g/100ml" },
    { val: min(vals("熱量(kcal)")), lbl: "最低熱量 kcal/100ml" },
    { val: min(vals("糖(g)")), lbl: "最低糖分 g/100ml" },
  ];
  document.getElementById("stats-row").innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="val">${s.val}</div><div class="lbl">${s.lbl}</div></div>`
  ).join("");
}

// ── 排行榜 ──
function rankItems(list, key, asc, limit = 5) {
  return list
    .filter(d => N(d, key) !== null)
    .sort((a, b) => asc ? N(a,key)-N(b,key) : N(b,key)-N(a,key))
    .slice(0, limit);
}

function renderRank(elId, items, key) {
  const medals = ["gold","silver","bronze","other","other"];
  document.getElementById(elId).innerHTML = items.map((d, i) => `
    <div class="rank-item">
      <div class="rank-no ${medals[i]}">${i+1}</div>
      <div class="rank-name">${d.name}<br><small style="color:var(--muted)">${d.brand}</small></div>
      <div class="rank-val">${N(d,key)}</div>
    </div>
  `).join("") || "<div style='color:var(--muted);font-size:.85rem;padding:.5rem'>無資料</div>";
}

function renderRankings(list) {
  renderRank("rank-energy-low", rankItems(list,"熱量(kcal)",true), "熱量(kcal)");
  renderRank("rank-sugar-low",  rankItems(list,"糖(g)",true),      "糖(g)");
  renderRank("rank-protein-high", rankItems(list,"蛋白質(g)",false), "蛋白質(g)");
  const highSugar = list.filter(d => (N(d,"糖(g)") ?? 0) > 10)
    .sort((a,b) => N(b,"糖(g)")-N(a,"糖(g)")).slice(0,5);
  renderRank("rank-sugar-high", highSugar, "糖(g)");
}

// ── 圖表 ──
let charts = {};
function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

function buildCharts(list) {
  destroyCharts();
  const GREEN = "rgba(82,183,136,0.8)";
  const ORANGE = "rgba(224,123,57,0.8)";
  const BLUE = "rgba(58,123,213,0.8)";
  const sorted = [...list].sort((a,b) => (N(a,"熱量(kcal)")??0)-(N(b,"熱量(kcal)")??0));

  // 熱量橫條
  const eData = sorted.filter(d => N(d,"熱量(kcal)")!==null);
  charts.energy = new Chart(document.getElementById("chartEnergy"), {
    type: "bar",
    data: {
      labels: eData.map(d => d.name.length > 12 ? d.name.slice(0,12)+"…" : d.name),
      datasets: [{ data: eData.map(d => N(d,"熱量(kcal)")), backgroundColor: ORANGE, borderRadius: 4 }]
    },
    options: { indexAxis:"y", plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}} }
  });

  // 糖分橫條
  const sData = [...list].filter(d=>N(d,"糖(g)")!==null).sort((a,b)=>N(a,"糖(g)")-N(b,"糖(g)"));
  charts.sugar = new Chart(document.getElementById("chartSugar"), {
    type: "bar",
    data: {
      labels: sData.map(d => d.name.length > 12 ? d.name.slice(0,12)+"…" : d.name),
      datasets: [{ data: sData.map(d => N(d,"糖(g)")), backgroundColor: d => d.raw > 10 ? "rgba(217,79,79,0.8)" : GREEN, borderRadius: 4 }]
    },
    options: { indexAxis:"y", plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}} }
  });

  // 散佈圖
  const scatter = list.filter(d=>N(d,"熱量(kcal)")!==null&&N(d,"糖(g)")!==null)
    .map(d=>({x:N(d,"糖(g)"),y:N(d,"熱量(kcal)"),label:d.name}));
  charts.scatter = new Chart(document.getElementById("chartScatter"), {
    type: "scatter",
    data: { datasets: [{ data: scatter, backgroundColor: GREEN, pointRadius: 6, pointHoverRadius: 8 }] },
    options: {
      plugins: { legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.raw.label}: 糖${c.raw.x}g, ${c.raw.y}kcal`}} },
      scales: { x:{title:{display:true,text:"糖(g/100ml)"}}, y:{title:{display:true,text:"熱量(kcal/100ml)"}} }
    }
  });

  // 鈉橫條
  const naData = [...list].filter(d=>N(d,"鈉(mg)")!==null).sort((a,b)=>N(b,"鈉(mg)")-N(a,"鈉(mg)"));
  charts.sodium = new Chart(document.getElementById("chartSodium"), {
    type: "bar",
    data: {
      labels: naData.map(d => d.name.length > 12 ? d.name.slice(0,12)+"…" : d.name),
      datasets: [{ data: naData.map(d => N(d,"鈉(mg)")), backgroundColor: BLUE, borderRadius: 4 }]
    },
    options: { indexAxis:"y", plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true}} }
  });
}

// ── 卡片 ──
function renderGrid(list) {
  document.getElementById("count").textContent = `共 ${list.length} 筆`;
  document.getElementById("no-result").style.display = list.length ? "none" : "block";
  document.getElementById("grid").innerHTML = list.map((d, i) => {
    const score = healthScore(d);
    const bars = BAR_KEYS.map(k => {
      const v = N(d, k);
      if (v === null) return "";
      const pct = Math.min(100, (v / BAR_MAX[k]) * 100).toFixed(1);
      const color = BAR_COLORS[k] || "var(--green-light)";
      return `<div class="nb-row">
        <span class="nb-lbl">${k}</span>
        <div class="nb-track"><div class="nb-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="nb-val">${v}</span>
      </div>`;
    }).join("");
    const tagColors = ["","orange","blue","","orange"];
    const tags = d.categories.slice(0,3).map((c,i)=>`<span class="tag ${tagColors[i]||""}">${c}</span>`).join("");
    return `<div class="card" onclick="openModal(${DRINKS.indexOf(d)})">
      <img class="card-img" src="${d.image||PLACEHOLDER}" alt="${d.name}" onerror="this.src='${PLACEHOLDER}'">
      <div class="card-body">
        <h2>${d.name}</h2>
        <div class="card-brand">${d.brand} · ${d.volume_ml}ml</div>
        <div class="card-tags">${tags}<span class="tag" style="background:${scoreColor(score)}22;color:${scoreColor(score)}">${scoreLabel(score)} ${score}</span></div>
        <div class="nutribar">${bars}</div>
      </div>
    </div>`;
  }).join("");
}

// ── Modal ──
function openModal(idx) {
  const d = DRINKS[idx];
  const score = healthScore(d);
  const rows = Object.entries(d.nutrients||{}).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join("");
  document.getElementById("modal-content").innerHTML = `
    <img src="${d.image||PLACEHOLDER}" alt="${d.name}" onerror="this.src='${PLACEHOLDER}'">
    <h2>${d.name}</h2>
    <div class="m-brand">${d.brand} · ${d.volume_ml}ml</div>
    <div class="score-ring">
      <div class="ring" style="background:${scoreColor(score)}22;color:${scoreColor(score)};border:3px solid ${scoreColor(score)}">${score}</div>
      <div class="score-desc">健康評分 <strong>${scoreLabel(score)}</strong><br>
        綜合熱量、糖分、鈉含量與蛋白質計算<br>
        <small style="color:var(--muted)">100分為最佳，僅供參考</small>
      </div>
    </div>
    ${rows ? `<div class="m-section">營養成分（per 100ml）</div><table>${rows}</table>` : ""}
    ${d.ingredients ? `<div class="m-section">成分列表</div><div class="m-ingredients">${d.ingredients}</div>` : ""}
    ${d.categories?.length ? `<div class="m-section">類別</div><div class="m-ingredients">${d.categories.join("・")}</div>` : ""}
  `;
  document.getElementById("overlay").classList.add("open");
}

document.getElementById("modal-close").onclick = () => document.getElementById("overlay").classList.remove("open");
document.getElementById("overlay").onclick = e => { if(e.target===document.getElementById("overlay")) document.getElementById("overlay").classList.remove("open"); };

// ── 篩選 & 排序 ──
function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sort").value;
  const cat = document.getElementById("filter-cat").value;

  filtered = DRINKS.filter(d =>
    (d.name.toLowerCase().includes(q) || (d.brand||"").toLowerCase().includes(q)) &&
    (!cat || d.categories.includes(cat))
  );

  const [key, dir] = {
    name:         ["name", "asc"],
    energy_asc:   ["熱量(kcal)", "asc"],
    energy_desc:  ["熱量(kcal)", "desc"],
    sugar_asc:    ["糖(g)", "asc"],
    sugar_desc:   ["糖(g)", "desc"],
    sodium_asc:   ["鈉(mg)", "asc"],
    protein_desc: ["蛋白質(g)", "desc"],
  }[sort] || ["name","asc"];

  filtered.sort((a,b) => {
    if (key === "name") return a.name.localeCompare(b.name, "zh-TW");
    const av = N(a,key)??999, bv = N(b,key)??999;
    return dir === "asc" ? av-bv : bv-av;
  });

  renderStats(filtered);
  renderRankings(filtered);
  buildCharts(filtered);
  renderGrid(filtered);
  buildCompareTable(filtered);
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("sort").addEventListener("change", applyFilters);
document.getElementById("filter-cat").addEventListener("change", applyFilters);

initCategoryFilter();
applyFilters();

// ── 比較矩陣 ──
// 定義列（成分標準）
const COMPARE_ROWS = [
  { key: "熱量(kcal)",    label: "熱量 (kcal/100ml)", unit: "kcal", low_good: true,  thresholds: [20, 40, 60] },
  { key: "糖(g)",         label: "糖分 (g/100ml)",    unit: "g",    low_good: true,  thresholds: [2, 6, 10] },
  { key: "鈉(mg)",        label: "鈉 (mg/100ml)",     unit: "mg",   low_good: true,  thresholds: [20, 60, 100] },
  { key: "蛋白質(g)",     label: "蛋白質 (g/100ml)",  unit: "g",    low_good: false, thresholds: [1, 2, 3] },
  { key: "脂肪(g)",       label: "脂肪 (g/100ml)",    unit: "g",    low_good: true,  thresholds: [0.5, 1.5, 3] },
  { key: "碳水化合物(g)", label: "碳水 (g/100ml)",    unit: "g",    low_good: true,  thresholds: [5, 10, 15] },
  { key: "維生素C(mg)",   label: "維生素C (mg/100ml)",unit: "mg",   low_good: false, thresholds: [10, 30, 60] },
  { key: "咖啡因(mg)",    label: "咖啡因 (mg/100ml)", unit: "mg",   low_good: true,  thresholds: [5, 15, 30] },
  { key: "_score",        label: "健康評分",           unit: "",     low_good: false, thresholds: [50, 65, 80] },
  { key: "_vol",          label: "容量 (ml)",          unit: "ml",   low_good: null,  thresholds: [] },
];

function cellClass(val, row) {
  if (val === null || row.low_good === null) return "";
  const [t1, t2, t3] = row.thresholds;
  if (row.low_good) {
    if (val <= t1) return "cell-best";
    if (val <= t2) return "cell-good";
    if (val <= t3) return "cell-warn";
    return "cell-bad";
  } else {
    if (val >= t3) return "cell-best";
    if (val >= t2) return "cell-good";
    if (val >= t1) return "cell-warn";
    return "cell-bad";
  }
}

function buildCompareTable(list) {
  const drinks = list.slice(0, 20);

  // 左欄（成分標籤）
  document.getElementById("compare-head-left").innerHTML =
    `<tr><th>成分 / 飲品</th></tr>`;
  document.getElementById("compare-body-left").innerHTML =
    COMPARE_ROWS.map(r => `<tr><td>${r.label}</td></tr>`).join("");

  // 右欄（各飲品數值）
  document.getElementById("compare-head-right").innerHTML =
    `<tr>${drinks.map(d => `<th><div class="col-name">${d.name}</div><div class="col-brand">${d.brand}</div></th>`).join("")}</tr>`;
  document.getElementById("compare-body-right").innerHTML =
    COMPARE_ROWS.map(row => {
      const cells = drinks.map(d => {
        let val = row.key === "_score" ? healthScore(d) : row.key === "_vol" ? d.volume_ml : N(d, row.key);
        if (val === null) return `<td class="cell-na">—</td>`;
        return `<td class="${cellClass(val, row)}">${val}${row.unit ? " "+row.unit : ""}</td>`;
      }).join("");
      return `<tr>${cells}</tr>`;
    }).join("");

  // 左右同步捲動
  const left = document.querySelector(".compare-left");
  const right = document.getElementById("compare-right");
  right.onscroll = () => { left.scrollTop = right.scrollTop; };
}

// 重新執行一次讓表格出現
buildCompareTable(DRINKS);
</script>
