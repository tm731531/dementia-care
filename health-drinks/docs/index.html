<style>
:root {
  --green: #2e7d5e;
  --green-light: #52b788;
  --green-pale: #d8f3e8;
  --bg: #f4faf7;
  --card: #ffffff;
  --text: #1a2e25;
  --muted: #5a7a6a;
  --border: #d0e8dc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang TC', 'Microsoft JhengHei', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, #1b4d35 0%, #2e7d5e 60%, #52b788 100%);
  color: #fff; padding: 2.5rem 1.5rem 2rem; text-align: center;
}
.hero h1 { font-size: clamp(1.3rem, 4vw, 2rem); font-weight: 700; letter-spacing: .02em; }
.hero p  { margin-top: .5rem; opacity: .85; font-size: .9rem; }

/* ── CONTROLS ── */
.controls {
  max-width: 1200px; margin: 1.2rem auto 0; padding: 0 1rem;
  display: flex; flex-wrap: wrap; gap: .75rem; align-items: center;
}
.controls input {
  padding: .5rem .85rem; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: .9rem; font-family: inherit; background: #fff; outline: none;
  flex: 1; min-width: 180px;
}
.controls input:focus { border-color: var(--green-light); }
#count { color: var(--muted); font-size: .85rem; margin-left: auto; white-space: nowrap; }

/* ── CATEGORY CHECKBOXES ── */
.cat-filter {
  max-width: 1200px; margin: .6rem auto 0; padding: 0 1rem;
  display: flex; flex-wrap: wrap; gap: .4rem; align-items: center;
}
.cat-filter-label { font-size: .8rem; color: var(--muted); margin-right: .2rem; }
.cat-chip {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .25rem .7rem; border-radius: 20px; font-size: .8rem; cursor: pointer;
  border: 1.5px solid var(--border); background: #fff; color: var(--muted);
  user-select: none; transition: all .15s;
}
.cat-chip input { display: none; }
.cat-chip.active {
  background: var(--green); border-color: var(--green); color: #fff;
}

/* ── HIDDEN DRINKS TRAY ── */
.hidden-tray {
  max-width: 1200px; margin: .5rem auto 0; padding: 0 1rem;
  display: none; flex-wrap: wrap; gap: .4rem; align-items: center;
}
.hidden-tray-label { font-size: .8rem; color: var(--muted); }
.restore-chip {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .2rem .6rem; border-radius: 20px; font-size: .75rem; cursor: pointer;
  border: 1.5px solid #bbb; background: #f0f0f0; color: #666;
  transition: all .15s;
}
.restore-chip:hover { background: var(--green-pale); border-color: var(--green-light); color: var(--green); }
.restore-chip .restore-x { font-size: .9rem; line-height: 1; }
#btn-show-all {
  padding: .2rem .7rem; border-radius: 20px; font-size: .75rem; cursor: pointer;
  border: 1.5px solid var(--green-light); background: #fff; color: var(--green);
  font-family: inherit;
}
#btn-show-all:hover { background: var(--green-pale); }

/* ── TABLE SECTION ── */
.table-section { max-width: 1200px; margin: .8rem auto 3rem; padding: 0 1rem; }

.table-outer {
  display: flex;
  height: 560px;
  border-radius: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,.09);
  overflow: hidden;
  border: 1px solid var(--border);
}
.table-left {
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  z-index: 2;
  box-shadow: 2px 0 6px rgba(0,0,0,.08);
}
.table-left::-webkit-scrollbar { display: none; }
.table-right { flex: 1; overflow: auto; }

.tbl-left, .tbl-right {
  border-collapse: collapse;
  font-size: .82rem;
  white-space: nowrap;
}
.tbl-left thead th, .tbl-right thead th {
  position: sticky; top: 0; z-index: 1;
  padding: .65rem .9rem; font-weight: 600;
  border-bottom: 2px solid #1b4d35;
}
.tbl-left thead th {
  background: #1b4d35; color: #fff;
  text-align: left; min-width: 170px;
  vertical-align: middle;
}
.tbl-right thead th {
  background: var(--green); color: #fff;
  text-align: center; min-width: 120px;
  vertical-align: top;
}
.tbl-left tbody tr, .tbl-right tbody tr { height: 36px; }
.tbl-left tbody td {
  background: #f4faf7; padding: 0 .9rem;
  font-weight: 500; color: var(--text);
  border-bottom: 1px solid var(--border);
  border-right: 3px solid var(--border);
  min-width: 170px;
}
.tbl-right tbody td {
  padding: 0 .75rem; text-align: center;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.tbl-right tbody td.na { color: #bbb; }
.tbl-left tbody tr:hover td  { background: #e0f0e8; }
.tbl-right tbody tr:hover td { background: #edf7f2; }

.col-name  { font-size: .78rem; line-height: 1.3; white-space: normal; max-width: 120px; }
.col-brand { font-size: .7rem; opacity: .75; }

/* hide button inside column header */
.hide-col-btn {
  display: block; margin: 0 auto .4rem;
  width: 28px; height: 28px; line-height: 28px; text-align: center;
  border-radius: 50%; border: none; cursor: pointer;
  background: rgba(255,255,255,.3); color: #fff; font-size: 1rem; font-weight: 700;

}
.hide-col-btn:hover { background: rgba(255,255,255,.6); color: #1b4d35; }

/* value color coding */
.cell-best  { background: #c8edd8 !important; font-weight: 600; }
.cell-worst { background: #fde8e8 !important; color: #b94040; }

/* sortable left column */
#tbody-left td { cursor: pointer; }
#tbody-left td.sort-active { background: #b8dfc9 !important; font-weight: 700; }

/* per-100ml toggle */
.toolbar {
  max-width: 1200px; margin: .6rem auto 0; padding: 0 1rem;

}

}
.toggle-btn.active { background: var(--green); border-color: var(--green); color: #fff; }

#no-result { text-align: center; color: var(--muted); padding: 3rem; display: none; }

/* Accessibility: keyboard focus ring (WCAG 2.4.7) */

<body>

<header class="hero">
  <h1>🥤 市售健康飲品成分分析</h1>
  <p>容量 180–280ml・依類別或品名篩選・成分平舖比較</p>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 搜尋飲品名稱或品牌…">
  <span id="count"></span>
</div>

<div class="cat-filter" id="cat-filter">
  <span class="cat-filter-label">類別：</span>
</div>

<div class="hidden-tray" id="hidden-tray">
  <span class="hidden-tray-label">已隱藏：</span>
  <button id="btn-show-all">全部顯示</button>
</div>

<div class="toolbar">
  <button class="toggle-btn" id="btn-per100">每 100ml 換算</button>
  <span class="toolbar-hint">點左欄成分名稱可排序・點右欄 × 可隱藏產品</span>
</div>

<script src="data/drinks.js"></script>
<div class="table-section">
  <div id="no-result">找不到符合的飲品</div>
  <div class="table-outer" id="table-outer">
    <div class="table-left" id="table-left">
      <table class="tbl-left">
        <thead id="thead-left"></thead>
        <tbody id="tbody-left"></tbody>
      </table>
    </div>
    <div class="table-right" id="table-right">
      <table class="tbl-right">
        <thead id="thead-right"></thead>
        <tbody id="tbody-right"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// 偏好的成分排列順序（依台灣營養標示標準格式）
const NUTRIENT_ORDER = [
  "熱量(kcal)","碳水化合物(g)","糖(g)","膳食纖維(g)","脂肪(g)","飽和脂肪(g)","反式脂肪(g)",
  "蛋白質(g)","鈉(mg)","鉀(mg)","鈣(mg)","磷(mg)","鎂(mg)","鋅(mg)","鐵(mg)","膽固醇(mg)",
  "維生素C(mg)","維生素D(mcg)","咖啡因(mg)"
];

const LOWER_IS_BETTER  = new Set(["熱量(kcal)","糖(g)","脂肪(g)","飽和脂肪(g)","反式脂肪(g)","鈉(mg)","膽固醇(mg)","咖啡因(mg)"]);
const HIGHER_IS_BETTER = new Set(["蛋白質(g)","膳食纖維(g)","鉀(mg)","鈣(mg)","磷(mg)","鎂(mg)","鋅(mg)","鐵(mg)","維生素C(mg)","維生素D(mcg)"]);

// 狀態
const selectedCats = new Set();
const hiddenIds    = new Set();
let sortKey = null;
let sortDir = 1;   // 1=升冪 -1=降冪
let per100  = false;

// ── 類別 checkbox 初始化 ──
function initCategoryFilter() {
  const cats = [...new Set(DRINKS.flatMap(d => d.categories))].sort();
  const container = document.getElementById("cat-filter");
  cats.forEach(c => {
    const label = document.createElement("label");
    label.className = "cat-chip";
    label.innerHTML = `<input type="checkbox" value="${c}">${c}`;
    label.querySelector("input").addEventListener("change", e => {
      if (e.target.checked) selectedCats.add(c); else selectedCats.delete(c);
      label.classList.toggle("active", e.target.checked);
      applyFilters();
    });
    container.appendChild(label);
  });
}

// ── 隱藏 tray ──
function refreshHiddenTray() {
  const tray = document.getElementById("hidden-tray");
  // 清除舊的 restore chips（保留 label 和 button）
  tray.querySelectorAll(".restore-chip").forEach(el => el.remove());

  if (hiddenIds.size === 0) {
    tray.style.display = "none";
    return;
  }
  tray.style.display = "flex";
  const btn = document.getElementById("btn-show-all");
  hiddenIds.forEach(id => {
    const d = DRINKS.find(x => x.id === id);
    if (!d) return;
    const chip = document.createElement("span");
    chip.className = "restore-chip";
    chip.innerHTML = `<span>${d.name}</span><span class="restore-x">↩</span>`;
    chip.title = "點擊還原";
    chip.addEventListener("click", () => {
      hiddenIds.delete(id);
      refreshHiddenTray();
      applyFilters();
    });
    tray.insertBefore(chip, btn);
  });
}

// ── 建表 ──
function buildTable(list) {
  const noResult = document.getElementById("no-result");
  const outer    = document.getElementById("table-outer");
  if (!list.length) {
    noResult.style.display = "block";
    outer.style.display = "none";
    return;
  }
  noResult.style.display = "none";
  outer.style.display = "flex";

  // 排序
  if (sortKey) {
    list = [...list].sort((a, b) => {
      const va = sortKey === "容量(ml)" ? a.volume_ml : (a.nutrients?.[sortKey] ?? -Infinity);
      const vb = sortKey === "容量(ml)" ? b.volume_ml : (b.nutrients?.[sortKey] ?? -Infinity);
      return (va - vb) * sortDir;
    });
  }

  // 成分聯集
  const keySet = new Set();
  list.forEach(d => Object.keys(d.nutrients || {}).forEach(k => keySet.add(k)));
  const ordered = NUTRIENT_ORDER.filter(k => keySet.has(k));
  const extra   = [...keySet].filter(k => !NUTRIENT_ORDER.includes(k));
  const rows    = ["容量(ml)", ...ordered, ...extra];

  // 取值（支援 per100 換算）
  function val(d, k) {
    const raw = k === "容量(ml)" ? d.volume_ml : (d.nutrients?.[k] ?? null);
    if (raw === null) return null;
    if (per100 && k !== "容量(ml)") return Math.round(raw / d.volume_ml * 1000) / 10;
    return raw;
  }

  // 左欄
  document.getElementById("thead-left").innerHTML = "<tr><th>成分 / 飲品</th></tr>";
  document.getElementById("tbody-left").innerHTML =
    rows.map(k => {
      const isActive = sortKey === k;
      const arrow = isActive ? (sortDir === 1 ? " ↑" : " ↓") : "";
      return `<tr><td class="${isActive ? "sort-active" : ""}" data-key="${k}">${k}${arrow}</td></tr>`;
    }).join("");

  // 右欄 header（含隱藏按鈕）
  document.getElementById("thead-right").innerHTML =
    "<tr>" + list.map(d =>
      `<th>` +
      `<button class="hide-col-btn" data-id="${d.id}" title="隱藏此欄">×</button>` +
      `<div class="col-name">${d.name}</div>` +
      `<div class="col-brand">${d.brand}</div>` +
      `</th>`
    ).join("") + "</tr>";

  // 右欄 body（含顏色標記）
  document.getElementById("tbody-right").innerHTML =
    rows.map(k => {
      const vals = list.map(d => val(d, k));
      const nonNull = vals.filter(v => v !== null);
      const min = nonNull.length > 1 ? Math.min(...nonNull) : null;
      const max = nonNull.length > 1 ? Math.max(...nonNull) : null;
      const cells = vals.map(v => {
        if (v === null) return `<td class="na">—</td>`;
        let cls = "";
        if (min !== null && min !== max) {
          if (LOWER_IS_BETTER.has(k))       cls = v === min ? "cell-best" : v === max ? "cell-worst" : "";
          else if (HIGHER_IS_BETTER.has(k)) cls = v === max ? "cell-best" : v === min ? "cell-worst" : "";
        }
        return `<td class="${cls}">${v}</td>`;
      }).join("");
      return `<tr>${cells}</tr>`;
    }).join("");

  // 排序點擊
  document.querySelectorAll("#tbody-left td").forEach(td => {
    td.addEventListener("click", () => {
      const k = td.dataset.key;
      if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
      applyFilters();
    });
  });

  // 隱藏按鈕事件
  document.querySelectorAll(".hide-col-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      hiddenIds.add(btn.dataset.id);
      refreshHiddenTray();
      applyFilters();
    });
  });

  // 同步 header 高度
  requestAnimationFrame(() => {
    const lh = document.querySelector("#thead-left tr");
    const rh = document.querySelector("#thead-right tr");
    if (lh && rh) {
      const h = Math.max(lh.offsetHeight, rh.offsetHeight);
      lh.style.height = h + "px";
      rh.style.height = h + "px";
    }
  });

  // 左右垂直同步捲動
  const left  = document.getElementById("table-left");
  const right = document.getElementById("table-right");
  right.onscroll = () => { left.scrollTop = right.scrollTop; };
  left.onscroll  = () => { right.scrollTop = left.scrollTop; };
}

// ── 篩選 ──
function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = DRINKS.filter(d =>
    !hiddenIds.has(d.id) &&
    (d.name.toLowerCase().includes(q) || (d.brand || "").toLowerCase().includes(q)) &&
    (selectedCats.size === 0 || d.categories.some(c => selectedCats.has(c)))
  );
  document.getElementById("count").textContent = `顯示 ${filtered.length} 筆`;
  buildTable(filtered);
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("btn-show-all").addEventListener("click", () => {
  hiddenIds.clear();
  refreshHiddenTray();
  applyFilters();
});
document.getElementById("btn-per100").addEventListener("click", function() {
  per100 = !per100;
  this.classList.toggle("active", per100);
  applyFilters();
});

initCategoryFilter();
applyFilters();
</script>
</body>
