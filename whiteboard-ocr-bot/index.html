<style>
:root {
  --bg: #0f1419;
  --bg-2: #1a2028;
  --bg-3: #252e38;
  --text: #e4e8ee;
  --text-dim: #9aa4b2;
  --accent: #5bc0be;
  --accent-2: #3a86ff;
  --ok: #6fcf97;
  --warn: #f2c94c;
  --skip: #6b7685;
  --bubble-user: #3a86ff;
  --bubble-bot: #252e38;
  --border: #303945;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
}

/* Top: intro */
.intro {
  width: 100%;
  max-width: 560px;
  text-align: center;
  padding: 18px 12px 10px;
}
.intro h1 { font-size: 22px; margin-bottom: 6px; color: var(--accent); }
.intro p { font-size: 13px; color: var(--text-dim); }
.intro .badge {
  display: inline-block;
  background: rgba(91, 192, 190, 0.12);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  margin-top: 8px;
}

/* Chat container */
.chat {
  width: 100%;
  max-width: 560px;
  background: var(--bg-2);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.chat-header {
  background: var(--bg-3);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.chat-header .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.chat-header .info { flex: 1; }
.chat-header .info .name { font-weight: 600; font-size: 14px; }
.chat-header .info .status { font-size: 11px; color: var(--ok); }
.chat-header .info .status::before {
  content: "●"; margin-right: 4px;
}

.chat-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 320px;
  max-height: 60vh;
  overflow-y: auto;
}
.chat-body::-webkit-scrollbar { width: 6px; }
.chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  word-wrap: break-word;
  animation: fadeIn 0.3s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.bubble.bot {
  background: var(--bubble-bot);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.bubble.user {
  background: var(--bubble-user);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.bubble.photo {
  padding: 4px;
  max-width: 72%;
}
.bubble.photo img {
  display: block;
  max-width: 100%;
  border-radius: 12px;
}
.bubble .time {
  display: block;
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  text-align: right;
}
.bubble.user .time { color: rgba(255,255,255,0.7); }

.typing {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 14px;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-dim);
  animation: typingBounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
  30% { opacity: 1; transform: translateY(-4px); }
}

.chat-input {
  padding: 12px 16px;
  background: var(--bg-3);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  flex: 1;
  padding: 12px 14px;
  border-radius: 22px;
  border: none;
  background: var(--accent);
  color: #0f1419;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.2s;
}
.btn:hover:not(:disabled) { background: #7dd3d1; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.secondary {
  flex: 0 0 auto;
  background: var(--bg-2);
  color: var(--text);
  padding: 12px 14px;
}
.btn.secondary:hover:not(:disabled) { background: var(--border); }

/* Data panel */
.record-panel {
  width: 100%;
  max-width: 560px;
  background: var(--bg-2);
  border-radius: 16px;
  border: 1px solid var(--border);
  margin-top: 16px;
  padding: 18px;
}
.record-panel h2 {
  font-size: 15px;
  color: var(--text);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.record-panel h2 .sub {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: normal;
  margin-left: auto;
}
.record-meta {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 14px;
  font-size: 13px;
  padding: 10px 12px;
  background: var(--bg-3);
  border-radius: 10px;
  margin-bottom: 12px;
}
.record-meta .label { color: var(--text-dim); }
.record-meta .value { color: var(--text); font-weight: 500; }

.items-grid {
  display: grid;
  gap: 6px;
}
.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--bg-3);
  border-radius: 8px;
  font-size: 13px;
}
.item-row .icon { font-size: 14px; min-width: 18px; }
.item-row .name { flex: 1; color: var(--text); }
.item-row .val {
  color: var(--text-dim);
  font-size: 12px;
}
.item-row.filled .val { color: var(--ok); font-weight: 500; }
.item-row.skipped .val { color: var(--skip); }

.desc-box {
  background: var(--bg-3);
  border-radius: 10px;
  padding: 10px 12px;
  margin-top: 10px;
  font-size: 12px;
  color: var(--text);
  white-space: pre-wrap;
  max-height: 120px;
  overflow-y: auto;
  border-left: 3px solid var(--accent);
}
.desc-box .empty { color: var(--text-dim); font-style: italic; }

.stat-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  font-size: 12px;
}
.stat-row .stat {
  flex: 1;
  text-align: center;
  padding: 8px 4px;
  background: var(--bg-3);
  border-radius: 8px;
}
.stat .num { display: block; font-size: 18px; font-weight: 700; }
.stat.ok .num { color: var(--ok); }
.stat.skip .num { color: var(--skip); }
.stat.note .num { color: var(--warn); }

.footer {
  width: 100%;
  max-width: 560px;
  margin-top: 20px;
  padding: 12px;
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
}
.footer a { color: var(--accent); text-decoration: none; }

/* hidden file input */
#fileInput { display: none; }

/* Text input mode (for optional note entry) */
.text-input-row {
  display: flex;
  gap: 8px;
  width: 100%;
}
.text-input-row input {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text);
  padding: 10px 14px;
  font-size: 14px;
  outline: none;
  font-family: inherit;
}
.text-input-row input:focus { border-color: var(--accent); }

@media (max-width: 480px) {
  .chat-body { min-height: 280px; max-height: 50vh; }
  .bubble { font-size: 13px; }
  .intro h1 { font-size: 19px; }
}
</style>
</head>

// ---- Helpers ----
function getShiftTag(date) {
  const h = date.getHours();
  if (h >= 7 && h < 18) return "DAY";
  if (h >= 18 && h < 24) return "NIGHT";
  return "GRAVEYARD";
}
function fmtTime(d) {
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// ---- Chat bubbles ----
const chatBody = document.getElementById("chatBody");
function addBubble(kind, content, isPhoto) {
  const div = document.createElement("div");
  div.className = `bubble ${kind}${isPhoto ? " photo" : ""}`;
  if (isPhoto && typeof content === "string") {
    const img = document.createElement("img");
    img.src = content;
    div.appendChild(img);
  } else {
    const p = document.createElement("div");
    p.innerHTML = content;
    div.appendChild(p);
    const t = document.createElement("span");
    t.className = "time";
    t.textContent = fmtTime(new Date());
    div.appendChild(t);
  }
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
  return div;
}
function addTyping() {
  const div = document.createElement("div");
  div.className = "bubble bot typing";
  div.id = "typing-indicator";
  div.innerHTML = '<span></span><span></span><span></span>';
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
  return div;
}
function removeTyping() {
  document.getElementById("typing-indicator")?.remove();
}

    <button class="btn" id="photoBtn">📸 拍照</button>
    <button class="btn secondary" id="sampleBtn" title="試用範例照片">🎯</button>
    <button class="btn secondary" id="textBtn" title="傳 LINE 回報">💬</button>
  `;
  document.getElementById("photoBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("sampleBtn").onclick = () => processPhoto(SAMPLE_PHOTO);
  document.getElementById("textBtn").onclick = setInputText;
}
function setInputText() {
  chatInput.innerHTML = `
    <div class="text-input-row">
      <input type="text" id="textBox" placeholder="傳一則 LINE 居服員回報..." autocomplete="off">
      <button class="btn secondary" id="sendBtn">傳</button>
      <button class="btn secondary" id="backBtn">↩</button>
    </div>
  `;
  const box = document.getElementById("textBox");
  box.focus();
  box.onkeypress = e => { if (e.key === "Enter") handleTextSend(); };
  document.getElementById("sendBtn").onclick = handleTextSend;
  document.getElementById("backBtn").onclick = setInputPhoto;
}
function handleTextSend() {
  const box = document.getElementById("textBox");
  const text = box.value.trim();
  if (!text) return;
  box.value = "";
  processTextMessage(text);
}

// ---- Simulated OCR (picks plausible values) ----
// Real bot calls Gemini 3 Flash Preview. Here we simulate by random-sampling
// realistic values: ~6 filled, ~6 null, with a bias toward first option.
function simulateOcr() {
  const result = {};
  // Random "fill rate": 4~8 items filled, rest null
  const fillCount = 4 + Math.floor(Math.random() * 5);
  const indices = [...Array(ITEMS.length).keys()].sort(() => Math.random() - 0.5);
  const toFill = new Set(indices.slice(0, fillCount));

  ITEMS.forEach((item, i) => {
    if (toFill.has(i)) {
      // Pick a random box with bias toward first/second options
      const bias = Math.random();
      let boxIdx;
      if (bias < 0.5) boxIdx = 0;
      else if (bias < 0.85) boxIdx = 1;
      else boxIdx = Math.min(2, item.opts.length - 1);
      result[item.key] = { value: item.opts[boxIdx], confidence: "high" };
    } else {
      result[item.key] = { value: null, confidence: "high" };
    }
  });
  return result;
}

// ---- OCR-side pipeline simulator ----
function processPhoto(dataUrl) {
  // Show user message with photo
  addBubble("user", dataUrl, true);

  // Typing indicator
  setTimeout(() => {
    const typing = addTyping();
    setTimeout(() => {
      removeTyping();
      addBubble("bot", "📥 收到照片，開始 OCR（Gemini 3 Flash Preview）...");
      setTimeout(() => {
        const ocr = simulateOcr();
        applyOcrToRecord(ocr);
        const filled = Object.values(ocr).filter(v => v.value !== null).length;
        const skipped = 12 - filled;
        const mode = record.created ? "🔄 更新" : "🆕 新建";
        record.created = true;
        const recId = 1000000 + Math.floor(Math.random() * 1000);
        addBubble("bot",
          `📋 <b>${record.name}</b> — ${fmtDate(new Date())}\n` +
          buildItemSummary(ocr) +
          `\n\n✅ 已寫入 ${filled} 項 / ⏭️ 略過 ${skipped} 項` +
          `\n${mode} iDempiere id = <code>${recId}</code>` +
          `\n📎 照片已附加`
        );
        updateMetaDisplay();
      }, 1500);
    }, 1200);
  }, 400);
}

function buildItemSummary(ocr) {
  return ITEMS.map(item => {
    const v = ocr[item.key];
    if (v.value === null) return `⏭️ ${item.cn}: <i>未填</i>`;
    return `✅ ${item.cn}: <b>${v.value}</b>`;
  }).join("<br>");
}

function applyOcrToRecord(ocr) {
  record.date = fmtDate(new Date());
  ITEMS.forEach(item => {
    const v = ocr[item.key];
    if (v.value !== null) {
      record.items[item.key] = v;
    }
    // null from OCR does NOT overwrite existing record value (find-or-update semantics)
  });
}

function processTextMessage(text) {
  addBubble("user", `<span style="white-space:pre-wrap">${text}</span>`);
  setTimeout(() => {
    const typing = addTyping();
    setTimeout(() => {
      removeTyping();
      const now = new Date();
      const entry = { shift: getShiftTag(now), time: fmtTime(now), text };
      record.description.unshift(entry);
      updateMetaDisplay();
      if (record.created) {
        addBubble("bot", `✅ 已附加到今天紀錄\n<code>[${entry.shift}|${entry.time}]${entry.text}</code>`);
      } else {
        addBubble("bot", `📝 今天還沒有紀錄，已排入待處理佇列\n<code>[${entry.shift}|${entry.time}]${entry.text}</code>\n\n等下次拍照時會一併寫入。`);
      }
    }, 900);
  }, 300);
}

// ---- Data panel rendering ----
function updateMetaDisplay() {
  document.getElementById("metaName").textContent = record.name;
  document.getElementById("metaDate").textContent = record.date || "—";
  document.getElementById("metaReporter").textContent = record.reporter;
  document.getElementById("recordMeta").textContent = record.created ? "今日已建立" : "尚未建立";

  const grid = document.getElementById("itemsGrid");
  grid.innerHTML = "";
  let ok = 0, skip = 0;
  ITEMS.forEach(item => {
    const v = record.items[item.key];
    const row = document.createElement("div");
    const filled = !!v;
    row.className = "item-row " + (filled ? "filled" : "skipped");
    row.innerHTML = `
      <span class="icon">${filled ? "✅" : "⏭️"}</span>
      <span class="name">${item.cn}</span>
      <span class="val">${filled ? v.value : "未填"}</span>
    `;
    grid.appendChild(row);
    if (filled) ok++; else skip++;
  });
  document.getElementById("statOk").textContent = ok;
  document.getElementById("statSkip").textContent = skip;
  document.getElementById("statNote").textContent = record.description.length;

  const descBox = document.getElementById("descBox");
  if (record.description.length === 0) {
    descBox.innerHTML = '<span class="empty">還沒有備註。拍張照或傳個 LINE 回報試試。</span>';
  } else {
    descBox.textContent = record.description.map(e => `[${e.shift}|${e.time}]${e.text}`).join("\n");
  }
}

// ---- File input handler ----
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    // Downscale to max 600px wide for chat display
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = Math.min(1, 600 / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      processPhoto(canvas.toDataURL("image/jpeg", 0.85));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = "";
});

// ---- Init ----
window.addEventListener("DOMContentLoaded", () => {
  setInputPhoto();
  updateMetaDisplay();
  setTimeout(() => {
    addBubble("bot", "👋 你好！我是白板 OCR 紀錄 Bot。\n\n傳一張今天的白板照片給我，我會自動辨識 12 個追蹤項目並寫入 iDempiere。\n\n💡 沒有白板？按下 <b>🎯</b> 用內建的範例照片試試看。\n\n💬 居服員在 LINE 的即時回報也可以按 <b>💬</b> 貼給我，會自動加上班別時間戳存進備註。");
  }, 300);
  setTimeout(() => {
    addBubble("bot", "這是示範版，不會真的連到 Gemini API 或 iDempiere —— 所有 OCR 結果都是模擬的。真實版請參考 <a href=\"https://github.com/tm731531/dementia-care/tree/main/whiteboard-ocr-bot\" target=\"_blank\" style=\"color:#5bc0be\">GitHub 說明</a>。");
  }, 1500);
});
</script>
